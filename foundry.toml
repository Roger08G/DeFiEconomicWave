[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.20"
evm_version = "london"
optimizer = true
optimizer_runs = 200
remappings = []
gas_reports = ["*"]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 15 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
